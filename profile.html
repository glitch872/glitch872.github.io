<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord Profile Embed</title>
  <style>
    body {
      margin: 0;
      background: #2c2f33;
      color: #fff;
      font-family: "Segoe UI", sans-serif;
    }

    .container {
      padding: 16px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }

    .avatar {
      border-radius: 50%;
      width: 64px;
      height: 64px;
      border: 2px solid #7289da;
    }

    h2 {
      font-size: 1.2rem;
      margin: 8px 0 4px;
    }

    .badges img {
      height: 24px;
      vertical-align: middle;
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <div class="container" id="profile">Loading...</div>

  <script>
    const BADGE_ICONS = {
      ActiveDeveloper: "https://cdn.discordapp.com/badge-icons/6bdc42827a38498929a4920da12695d9.png",
      HypeSquadOnlineHouse1: "https://cdn.discordapp.com/badge-icons/8a88d63823d8a71cd5e390baa45efa02.png", // Bravery
      HypeSquadOnlineHouse2: "https://cdn.discordapp.com/badge-icons/011940fd013da3f7fb926e4a1cd2e618.png", // Brilliance
      HypeSquadOnlineHouse3: "https://cdn.discordapp.com/badge-icons/3aa41de486fa12454c3761e8e223442e.png"  // Balance
    };

    const container = document.getElementById("profile");

    const source = new EventSource("https://discord-embed.glitch-bypass.com/events");

    source.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        const activity = data.presence?.activities?.[0];

        const badges = (data.badges || [])
          .map(b => BADGE_ICONS[b] ? `<img src="${BADGE_ICONS[b]}" title="${b}">` : '')
          .join('');

        container.innerHTML = `
          <img src="${data.avatar}" class="avatar" />
          <h2>${data.username}#${data.discriminator}</h2>
          <p>Status: ${data.presence?.status || 'offline'}</p>
          <p>${activity ? `Activity: ${activity.name}` : ''}</p>
          <div class="badges">${badges}</div>
        `;
      } catch (e) {
        container.innerHTML = `<p>Error loading profile</p>`;
        console.error("Failed to parse event data:", e);
      }
    };

    source.onerror = () => {
      container.innerHTML = `<p>Disconnected from live updates</p>`;
    };
  </script>
</body>
</html>

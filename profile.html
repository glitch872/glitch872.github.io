<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discord Profile Embed</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #2c2f33;
      color: #fff;
      font-family: "Segoe UI", sans-serif;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .container {
      padding: 12px;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      height: 100%;
    }

    .avatar-wrapper {
      position: relative;
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: block;
    }

    .status-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      bottom: 0;
      right: 0;
      border: 2px solid #2c2f33;
      background: gray;
      box-sizing: content-box;
    }

    .status-dot[data-status="online"] { background: #43b581; }
    .status-dot[data-status="idle"] { background: #faa61a; }
    .status-dot[data-status="dnd"] { background: #f04747; }
    .status-dot[data-status="offline"] { background: #747f8d; }

    .profile-info {
      margin-left: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
      overflow: hidden;
      height: 100%;
    }

    .username-line {
      font-weight: 600;
      display: flex;
      align-items: center;
      white-space: nowrap;
      overflow: hidden;
      font-size: 1.1rem;
      transition: font-size 0.3s ease;
      max-width: 100%;
    }

    .username-text {
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: font-size 0.3s ease;
    }

    .pronouns {
      font-size: 0.85rem;
      color: #b9bbbe;
      margin-top: 2px;
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .badges {
      margin-top: 4px;
      display: flex;
      gap: 4px;
      overflow: hidden;
      max-width: 100%;
    }

    .badges img {
      height: 20px;
      vertical-align: middle;
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container" id="profile">Loading...</div>

  <script>
    const BADGE_ICONS = {
      ActiveDeveloper: "https://cdn.discordapp.com/badge-icons/6bdc42827a38498929a4920da12695d9.png",
      HypeSquadOnlineHouse1: "https://cdn.discordapp.com/badge-icons/011940fd013da3f7fb926e4a1cd2e618.png",
      HypeSquadOnlineHouse2: "https://cdn.discordapp.com/badge-icons/8a88d63823d8a71cd5e390baa45efa02.png",
      HypeSquadOnlineHouse3: "https://cdn.discordapp.com/badge-icons/3aa41de486fa12454c3761e8e223442e.png"
    };

    function getStatusColor(status) {
      switch(status) {
        case 'online': return '#43b581';
        case 'idle': return '#faa61a';
        case 'dnd': return '#f04747';
        case 'offline': return '#747f8d';
        default: return 'gray';
      }
    }

    async function loadProfile() {
      try {
        const res = await fetch("https://discord-embed.glitch-bypass.com/profile");
        const data = await res.json();

        const badges = (data.badges || [])
          .map(b => BADGE_ICONS[b] ? `<img src="${BADGE_ICONS[b]}" title="${b}">` : '')
          .join('');

        const status = data.presence?.status || 'offline';

        document.getElementById("profile").innerHTML = `
          <div class="avatar-wrapper">
            <img src="${data.avatar}" alt="avatar" class="avatar" />
            <span class="status-dot" data-status="${status}" style="background:${getStatusColor(status)}"></span>
          </div>
          <div class="profile-info">
            <div class="username-line">
              <span class="username-text">${data.username}</span>
            </div>
            ${data.pronouns ? `<div class="pronouns" title="${data.pronouns}">${data.pronouns}</div>` : ''}
            <div class="badges">${badges}</div>
          </div>
        `;

        // Animate font resizing after layout settles
        setTimeout(() => {
          const usernameEl = document.querySelector('.username-text');
          const parentEl = usernameEl?.parentElement;

          if (usernameEl && parentEl) {
            usernameEl.style.overflow = 'visible';
            usernameEl.style.textOverflow = 'unset';

            let fontSize = 1.1;
            const minFontSize = 0.85;  // Minimum comfortable font size in rem
            const maxWidth = parentEl.offsetWidth;

            while (usernameEl.scrollWidth > maxWidth && fontSize > minFontSize) {
              fontSize -= 0.03;  // smaller decrements for smoother shrinking
              usernameEl.style.fontSize = fontSize + 'rem';
            }

            usernameEl.style.overflow = 'hidden';
            usernameEl.style.textOverflow = 'ellipsis';
          }
        }, 10);

      } catch (e) {
        document.getElementById("profile").textContent = "Failed to load profile";
        console.error("Profile load error:", e);
      }
    }

    loadProfile();
    setInterval(loadProfile, 15000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Discord Profile Embed</title>
  <style>
    body {
      margin: 0;
      background: #2c2f33;
      color: #fff;
      font-family: "Segoe UI", sans-serif;
    }

    .container {
      padding: 16px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }

    .avatar {
      border-radius: 50%;
      width: 64px;
      height: 64px;
      border: 2px solid #7289da;
    }

    h2 {
      font-size: 1.2rem;
      margin: 8px 0 4px;
    }

    .badges img {
      height: 24px;
      vertical-align: middle;
      margin-right: 4px;
    }

    .status-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }
    .status-dot[data-status="online"] {
      background-color: #43b581;
    }
    .status-dot[data-status="idle"] {
      background-color: #faa61a;
    }
    .status-dot[data-status="dnd"] {
      background-color: #f04747;
    }
    .status-dot[data-status="offline"] {
      background-color: #747f8d;
    }
  </style>
</head>
<body>
  <div class="container" id="profile">Loading...</div>

  <script>
    const BADGE_ICONS = {
      ActiveDeveloper: "https://cdn.discordapp.com/badge-icons/6bdc42827a38498929a4920da12695d9.png",
      HypeSquadOnlineHouse1: "https://cdn.discordapp.com/badge-icons/011940fd013da3f7fb926e4a1cd2e618.png",
      HypeSquadOnlineHouse2: "https://cdn.discordapp.com/badge-icons/8a88d63823d8a71cd5e390baa45efa02.png",
      HypeSquadOnlineHouse3: "https://cdn.discordapp.com/badge-icons/3aa41de486fa12454c3761e8e223442e.png"
    };

    async function loadProfile() {
      try {
        const res = await fetch("https://discord-embed.glitch-bypass.com/profile");
        const data = await res.json();
        const activity = data.presence?.activities?.[0];
        const badges = (data.badges || [])
          .map(b => BADGE_ICONS[b] ? `<img src="${BADGE_ICONS[b]}" title="${b}">` : '')
          .join('');

        const container = document.getElementById("profile");
        container.innerHTML = `
          <img src="${data.avatar}" class="avatar" />
          <h2>${data.username}#${data.discriminator}</h2>
          <p>Status: <span class="status-dot" data-status="${data.presence?.status || 'offline'}"></span> ${data.presence?.status || 'offline'}</p>
          <p>${activity ? `Activity: ${activity.name}` : ''}</p>
          <div class="badges">${badges}</div>
        `;
      } catch (err) {
        document.getElementById("profile").textContent = "Profile load error.";
        console.error("Profile load error:", err);
      }
    }

    loadProfile();
    setInterval(loadProfile, 10000); // refresh every 10 seconds
  </script>
</body>
</html>
